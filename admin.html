<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 - INSTA HOTEL</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://use.typekit.net/pab8ndu.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *{ margin:0; padding:0; box-sizing:border-box; font-family:'Barlow',sans-serif; }
        body{ background:#f0f2f5; color:rgb(28,28,28); -webkit-font-smoothing:antialiased; }

        /* ── 로그인 ── */
        #loginScreen{ display:flex; align-items:center; justify-content:center; min-height:100vh; background:rgb(28,28,28); }
        .login-box{ background:#fff; border-radius:16px; padding:48px 44px; width:380px; }
        .login-logo{ font-size:22px; font-weight:800; letter-spacing:2px; margin-bottom:6px; }
        .login-sub{ font-size:13px; color:rgb(112,112,112); margin-bottom:32px; }
        .login-label{ font-size:13px; font-weight:600; margin-bottom:7px; display:block; }
        .login-input{ width:100%; height:48px; border:1.5px solid #ddd; border-radius:8px; padding:0 14px; font-size:15px; font-family:'Barlow',sans-serif; outline:none; transition:border-color .2s; }
        .login-input:focus{ border-color:rgb(28,28,28); }
        .login-btn{ width:100%; height:50px; background:rgb(28,28,28); color:#fff; border:none; border-radius:8px; font-size:15px; font-weight:700; cursor:pointer; margin-top:20px; font-family:'Barlow',sans-serif; }
        .login-btn:hover{ background:#333; }
        .login-error{ display:none; color:#e74c3c; font-size:13px; margin-top:10px; text-align:center; }

        /* ── 관리자 화면 ── */
        #adminScreen{ display:none; min-height:100vh; }
        .admin-header{ background:rgb(28,28,28); color:#fff; height:60px; display:flex; align-items:center; justify-content:space-between; padding:0 32px; position:sticky; top:0; z-index:200; }
        .admin-header-left{ display:flex; align-items:center; gap:14px; }
        .admin-logo{ font-size:16px; font-weight:800; letter-spacing:2px; }
        .admin-badge{ background:#00768e; color:#fff; font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
        .logout-btn{ background:transparent; border:1px solid rgba(255,255,255,.3); color:#fff; font-size:12px; padding:6px 14px; border-radius:6px; cursor:pointer; font-family:'Barlow',sans-serif; }
        .logout-btn:hover{ background:rgba(255,255,255,.1); }

        /* ── 탭 ── */
        .tab-nav{ background:#fff; border-bottom:2px solid #f0f0f0; display:flex; padding:0 32px; position:sticky; top:60px; z-index:100; }
        .tab-btn{ padding:16px 22px; font-size:14px; font-weight:600; cursor:pointer; border:none; background:none; color:rgb(112,112,112); border-bottom:2px solid transparent; margin-bottom:-2px; transition:color .2s, border-color .2s; font-family:'Barlow',sans-serif; }
        .tab-btn.active{ color:rgb(28,28,28); border-bottom-color:rgb(28,28,28); }
        .tab-btn i{ margin-right:7px; }

        /* ── 공통 컨테이너 ── */
        .admin-body{ max-width:1440px; margin:0 auto; padding:28px 24px 80px; }
        .tab-panel{ display:none; }
        .tab-panel.active{ display:block; }

        /* ── 통계 카드 ── */
        .stats-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:24px; }
        .stat-card{ background:#fff; border-radius:12px; padding:22px 24px; border:1px solid #e8e8e8; }
        .stat-label{ font-size:12px; color:rgb(112,112,112); margin-bottom:10px; display:flex; align-items:center; gap:8px; font-weight:600; text-transform:uppercase; letter-spacing:.3px; }
        .stat-icon{ width:30px; height:30px; border-radius:8px; display:inline-flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
        .stat-value{ font-size:26px; font-weight:800; color:rgb(28,28,28); }
        .stat-unit{ font-size:13px; font-weight:500; }
        .ic-blue{ background:#e8f4fd; color:#2980b9; }
        .ic-green{ background:#eafaf1; color:#27ae60; }
        .ic-orange{ background:#fef9e7; color:#f39c12; }
        .ic-purple{ background:#f4ecfb; color:#8e44ad; }

        /* ── 필터 바 ── */
        .filter-bar{ background:#fff; border-radius:12px; padding:16px 20px; border:1px solid #e8e8e8; margin-bottom:14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .fi{ height:40px; border:1.5px solid #ddd; border-radius:8px; padding:0 12px; font-size:13px; font-family:'Barlow',sans-serif; outline:none; transition:border-color .2s; background:#fff; }
        .fi:focus{ border-color:rgb(28,28,28); }
        .fi-search{ width:220px; }
        .fi-select{ cursor:pointer; }
        .fi-btn{ height:40px; padding:0 16px; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Barlow',sans-serif; border:none; }
        .fi-btn-dark{ background:rgb(28,28,28); color:#fff; }
        .fi-btn-dark:hover{ background:#333; }
        .fi-btn-light{ background:#f4f4f4; color:rgb(112,112,112); }
        .fi-btn-light:hover{ background:#e8e8e8; }
        .filter-count{ margin-left:auto; font-size:13px; color:rgb(112,112,112); white-space:nowrap; }

        /* ── 테이블 카드 ── */
        .table-card{ background:#fff; border-radius:12px; border:1px solid #e8e8e8; overflow:hidden; }
        .table-card-header{ padding:18px 22px 14px; border-bottom:1px solid #f0f0f0; display:flex; align-items:center; justify-content:space-between; }
        .table-card-title{ font-size:15px; font-weight:700; }
        .refresh-btn{ display:flex; align-items:center; gap:6px; background:#f4f4f4; border:none; border-radius:8px; padding:7px 14px; font-size:12px; font-weight:600; cursor:pointer; font-family:'Barlow',sans-serif; }
        .refresh-btn:hover{ background:#e8e8e8; }
        table{ width:100%; border-collapse:collapse; font-size:13px; }
        thead tr{ background:#f8f8f8; }
        th{ padding:11px 14px; text-align:left; font-size:11px; font-weight:700; color:rgb(112,112,112); text-transform:uppercase; letter-spacing:.5px; white-space:nowrap; border-bottom:1px solid #f0f0f0; }
        td{ padding:13px 14px; border-bottom:1px solid #f8f8f8; vertical-align:middle; }
        tbody tr{ cursor:pointer; transition:background .15s; }
        tbody tr:hover{ background:#fafafa; }
        tbody tr:last-child td{ border-bottom:none; }
        .order-id-cell{ font-family:monospace; font-size:11px; color:rgb(112,112,112); max-width:130px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .room-cell{ color:#00768e; font-weight:600; }
        .badge-paid{ display:inline-block; background:#eafaf1; color:#27ae60; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
        .badge-pending{ display:inline-block; background:#fef9e7; color:#f39c12; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
        .badge-cancelled{ display:inline-block; background:#fdf2f2; color:#e74c3c; font-size:11px; font-weight:700; padding:3px 10px; border-radius:20px; }
        .empty-state{ padding:60px 20px; text-align:center; color:rgb(112,112,112); }
        .empty-state i{ font-size:36px; margin-bottom:14px; display:block; color:#ddd; }
        .loading-state{ padding:60px 20px; text-align:center; color:rgb(112,112,112); }
        .loading-state i{ font-size:28px; margin-bottom:12px; display:block; color:#ddd; animation:spin 1s linear infinite; }
        @keyframes spin{ to{ transform:rotate(360deg); } }

        /* ── 재고·요금 관리 ── */
        .inv-top{ background:#fff; border-radius:12px; border:1px solid #e8e8e8; padding:16px 20px; margin-bottom:14px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
        .month-nav{ display:flex; align-items:center; gap:10px; }
        .month-nav-btn{ width:34px; height:34px; border-radius:8px; border:1.5px solid #ddd; background:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; transition:background .15s; }
        .month-nav-btn:hover{ background:#f4f4f4; }
        .month-label{ font-size:16px; font-weight:700; min-width:110px; text-align:center; }
        .bulk-btn{ display:flex; align-items:center; gap:7px; height:38px; padding:0 16px; background:rgb(28,28,28); color:#fff; border:none; border-radius:8px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Barlow',sans-serif; margin-left:auto; }
        .bulk-btn:hover{ background:#333; }
        .inv-legend{ display:flex; gap:18px; align-items:center; margin-bottom:12px; font-size:12px; color:rgb(112,112,112); padding:0 2px; }
        .legend-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:4px; }
        .dot-avail{ background:#27ae60; }
        .dot-closed{ background:#e74c3c; }
        .dot-none{ background:#ddd; }

        /* ── 스프레드시트 ── */
        .inv-sheet-wrap{ background:#fff; border-radius:12px; border:1px solid #e8e8e8; overflow:hidden; }
        .inv-scroll{ overflow-x:auto; }
        .inv-table{ border-collapse:collapse; min-width:max-content; width:100%; }
        .inv-table th, .inv-table td{ border:1px solid #eee; }
        .th-room{ position:sticky; left:0; z-index:6; background:#f8f8f8; min-width:108px; padding:10px 14px; font-size:12px; font-weight:700; color:rgb(112,112,112); text-transform:uppercase; letter-spacing:.3px; border-right:2px solid #e0e0e0; white-space:nowrap; }
        .th-date{ min-width:70px; width:70px; text-align:center; padding:8px 4px; font-size:12px; font-weight:700; background:#f8f8f8; white-space:nowrap; }
        .th-date .d-num{ font-size:14px; font-weight:800; display:block; line-height:1; margin-bottom:2px; }
        .th-date .d-dow{ font-size:10px; font-weight:600; }
        .th-date.th-sun .d-num, .th-date.th-sun .d-dow{ color:#e74c3c; }
        .th-date.th-sat .d-num, .th-date.th-sat .d-dow{ color:#2980b9; }
        .th-date.th-today{ background:#e8f4fd; }
        .td-room{ position:sticky; left:0; z-index:5; background:#fff; padding:0 14px; font-size:13px; font-weight:700; color:rgb(28,28,28); border-right:2px solid #e0e0e0; white-space:nowrap; min-width:108px; }
        .td-room span{ display:block; font-size:10px; font-weight:500; color:rgb(112,112,112); margin-top:2px; }
        .inv-cell{ width:70px; height:72px; text-align:center; cursor:pointer; padding:6px 4px; vertical-align:middle; transition:filter .12s; }
        .inv-cell:hover{ filter:brightness(.93); }
        .inv-cell.c-none{ background:#fafafa; }
        .inv-cell.c-avail{ background:#f0faf5; }
        .inv-cell.c-closed{ background:#fff2f2; }
        .inv-cell.c-past{ opacity:.5; }
        .inv-cell.c-today{ outline:2px solid #00768e; outline-offset:-2px; }
        .ic-price{ font-size:12px; font-weight:800; color:rgb(28,28,28); display:block; line-height:1.2; }
        .ic-stock{ font-size:10px; color:rgb(112,112,112); display:block; margin-top:3px; }
        .ic-dot{ width:6px; height:6px; border-radius:50%; display:inline-block; margin-top:4px; }
        .ic-dot-avail{ background:#27ae60; }
        .ic-dot-closed{ background:#e74c3c; }
        .ic-dot-none{ background:#ccc; }
        .inv-loading{ padding:80px 20px; text-align:center; color:#bbb; }
        .inv-loading i{ font-size:28px; display:block; margin-bottom:12px; animation:spin 1s linear infinite; }

        /* ── 모달 공통 ── */
        .modal-overlay{ display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:9999; align-items:center; justify-content:center; padding:20px; }
        .modal-overlay.open{ display:flex; }
        .modal-box{ background:#fff; border-radius:16px; width:100%; display:flex; flex-direction:column; max-height:90vh; overflow:hidden; }
        .modal-box-sm{ max-width:480px; }
        .modal-box-md{ max-width:560px; }
        .modal-head{ display:flex; align-items:center; justify-content:space-between; padding:20px 26px 16px; border-bottom:1px solid #ebebeb; }
        .modal-head h3{ font-size:16px; font-weight:700; }
        .modal-close-x{ background:none; border:none; font-size:20px; cursor:pointer; color:rgb(112,112,112); padding:2px 6px; line-height:1; }
        .modal-close-x:hover{ color:rgb(28,28,28); }
        .modal-body{ padding:22px 26px; overflow-y:auto; }
        .modal-foot{ padding:14px 26px; border-top:1px solid #ebebeb; display:flex; justify-content:flex-end; gap:10px; }
        .m-btn{ height:44px; padding:0 22px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:'Barlow',sans-serif; border:none; }
        .m-btn-dark{ background:rgb(28,28,28); color:#fff; }
        .m-btn-dark:hover{ background:#333; }
        .m-btn-light{ background:#f4f4f4; color:rgb(112,112,112); }
        .m-btn-light:hover{ background:#e8e8e8; }
        .m-btn-teal{ background:#00768e; color:#fff; }
        .m-btn-teal:hover{ background:#005f73; }

        /* 날짜 편집 모달 */
        .date-modal-date{ font-size:17px; font-weight:700; margin-bottom:20px; color:rgb(28,28,28); }
        .avail-toggle-row{ display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:20px; border-bottom:1px solid #f0f0f0; }
        .avail-toggle-label{ font-size:14px; font-weight:600; }
        .avail-toggle{ display:flex; border-radius:8px; overflow:hidden; border:1.5px solid #ddd; }
        .avail-toggle button{ height:38px; padding:0 18px; font-size:13px; font-weight:600; cursor:pointer; font-family:'Barlow',sans-serif; border:none; background:#fff; color:rgb(112,112,112); transition:all .15s; }
        .avail-toggle button.sel-avail{ background:#27ae60; color:#fff; }
        .avail-toggle button.sel-closed{ background:#e74c3c; color:#fff; }
        .edit-form-group{ margin-bottom:16px; }
        .edit-form-group:last-child{ margin-bottom:0; }
        .edit-form-label{ font-size:13px; font-weight:600; margin-bottom:7px; display:block; }
        .edit-form-input{ width:100%; height:46px; border:1.5px solid #ddd; border-radius:8px; padding:0 14px; font-size:15px; font-family:'Barlow',sans-serif; outline:none; transition:border-color .2s; }
        .edit-form-input:focus{ border-color:rgb(28,28,28); }
        .input-prefix{ position:relative; }
        .input-prefix span{ position:absolute; left:14px; top:50%; transform:translateY(-50%); font-size:14px; color:rgb(112,112,112); pointer-events:none; }
        .input-prefix input{ padding-left:28px; }

        /* 일괄 설정 모달 */
        .bulk-form-group{ margin-bottom:18px; }
        .bulk-label{ font-size:13px; font-weight:600; margin-bottom:7px; display:block; }
        .bulk-input{ width:100%; height:44px; border:1.5px solid #ddd; border-radius:8px; padding:0 14px; font-size:14px; font-family:'Barlow',sans-serif; outline:none; transition:border-color .2s; }
        .bulk-input:focus{ border-color:rgb(28,28,28); }
        .bulk-row{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
        .dow-checks{ display:flex; gap:8px; flex-wrap:wrap; margin-top:6px; }
        .dow-check{ display:none; }
        .dow-check-label{ display:flex; align-items:center; justify-content:center; width:40px; height:36px; border-radius:8px; border:1.5px solid #ddd; font-size:12px; font-weight:700; cursor:pointer; transition:all .15s; color:rgb(112,112,112); }
        .dow-check-label.sun{ color:#e74c3c; }
        .dow-check-label.sat{ color:#2980b9; }
        .dow-check:checked + .dow-check-label{ background:rgb(28,28,28); color:#fff; border-color:rgb(28,28,28); }
        .dow-check:checked + .dow-check-label.sun{ background:#e74c3c; border-color:#e74c3c; }
        .dow-check:checked + .dow-check-label.sat{ background:#2980b9; border-color:#2980b9; }
        .bulk-hint{ font-size:12px; color:rgb(112,112,112); margin-top:5px; }

        /* 예약 상세 모달 */
        .modal-section-title{ font-size:11px; font-weight:700; color:rgb(112,112,112); text-transform:uppercase; letter-spacing:.5px; margin-bottom:10px; padding-bottom:8px; border-bottom:1px solid #f0f0f0; }
        .modal-section{ margin-bottom:20px; }
        .modal-row{ display:flex; justify-content:space-between; padding:8px 0; font-size:14px; border-bottom:1px solid #f8f8f8; }
        .modal-row:last-child{ border-bottom:none; }
        .modal-key{ color:rgb(112,112,112); }
        .modal-val{ font-weight:600; text-align:right; max-width:300px; word-break:break-all; }

        /* 저장 토스트 */
        #saveToast{ position:fixed; bottom:28px; left:50%; transform:translateX(-50%) translateY(20px); background:rgb(28,28,28); color:#fff; padding:12px 24px; border-radius:10px; font-size:13px; font-weight:600; opacity:0; transition:all .3s; pointer-events:none; z-index:99999; }
        #saveToast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

        @media(max-width:900px){
            .stats-grid{ grid-template-columns:1fr 1fr; }
            .cal-cell{ min-height:80px; padding:7px 8px; }
        }
    </style>
</head>
<body>

<!-- ── 로그인 ── -->
<div id="loginScreen">
    <div class="login-box">
        <div class="login-logo">INSTA HOTEL</div>
        <div class="login-sub">관리자 페이지</div>
        <label class="login-label">비밀번호</label>
        <input class="login-input" id="pwInput" type="password" placeholder="비밀번호 입력" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="login-btn" onclick="doLogin()">로그인</button>
        <div class="login-error" id="loginError">비밀번호가 올바르지 않습니다.</div>
    </div>
</div>

<!-- ── 관리자 화면 ── -->
<div id="adminScreen">
    <header class="admin-header">
        <div class="admin-header-left">
            <span class="admin-logo">INSTA HOTEL</span>
            <span class="admin-badge">ADMIN</span>
        </div>
        <button class="logout-btn" onclick="doLogout()"><i class="fa-solid fa-right-from-bracket"></i> 로그아웃</button>
    </header>

    <nav class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('dashboard')"><i class="fa-solid fa-gauge"></i>대시보드</button>
        <button class="tab-btn" onclick="switchTab('reservations')"><i class="fa-solid fa-list"></i>예약 목록</button>
        <button class="tab-btn" onclick="switchTab('inventory')"><i class="fa-solid fa-calendar-days"></i>재고·요금 관리</button>
    </nav>

    <div class="admin-body">

        <!-- ───── 대시보드 ───── -->
        <div class="tab-panel active" id="panel-dashboard">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label"><span class="stat-icon ic-blue"><i class="fa-solid fa-calendar-check"></i></span>전체 예약</div>
                    <div class="stat-value" id="statTotal">—<span class="stat-unit"> 건</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label"><span class="stat-icon ic-green"><i class="fa-solid fa-won-sign"></i></span>전체 매출</div>
                    <div class="stat-value" id="statRevenue">—</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label"><span class="stat-icon ic-orange"><i class="fa-solid fa-calendar-days"></i></span>이번 달 예약</div>
                    <div class="stat-value" id="statMonthly">—<span class="stat-unit"> 건</span></div>
                </div>
                <div class="stat-card">
                    <div class="stat-label"><span class="stat-icon ic-purple"><i class="fa-solid fa-chart-line"></i></span>이번 달 매출</div>
                    <div class="stat-value" id="statMonthlyRev">—</div>
                </div>
            </div>

            <div class="table-card">
                <div class="table-card-header">
                    <span class="table-card-title">최근 예약</span>
                    <button class="refresh-btn" onclick="loadReservations()"><i class="fa-solid fa-arrows-rotate"></i> 새로고침</button>
                </div>
                <div id="recentTableArea">
                    <div class="loading-state"><i class="fa-solid fa-circle-notch"></i><p>불러오는 중...</p></div>
                </div>
            </div>
        </div>

        <!-- ───── 예약 목록 ───── -->
        <div class="tab-panel" id="panel-reservations">
            <div class="filter-bar">
                <input class="fi fi-search" id="searchInput" type="text" placeholder="이름·이메일·예약번호 검색..." oninput="applyFilter()">
                <select class="fi fi-select" id="filterRoom" onchange="applyFilter()">
                    <option value="">전체 객실</option>
                    <option>이코노미 룸</option><option>스탠다드 룸</option><option>디럭스 룸</option>
                    <option>트윈 룸</option><option>스페셜 룸</option><option>루비 룸</option>
                </select>
                <select class="fi fi-select" id="filterStatus" onchange="applyFilter()">
                    <option value="">전체 상태</option>
                    <option value="paid">결제 완료</option>
                    <option value="pending">대기 중</option>
                    <option value="cancelled">취소됨</option>
                </select>
                <input class="fi" id="filterDateFrom" type="date" onchange="applyFilter()" title="체크인 시작">

async function loadReservations(){
    ['recentTableArea','fullTableArea'].forEach(id=>{

    const {data,error}=await _sb.from('reservations').select('*').order('created_at',{ascending:false});
    if(error){
        ['recentTableArea','fullTableArea'].forEach(id=>{
            const el=document.getElementById(id);
            if(el) el.innerHTML=`<div class="empty-state"><i class="fa-solid fa-triangle-exclamation"></i><p>오류: ${error.message}</p></div>`;
        });
        return;
    }
    allData=data||[];
    updateStats(allData);
    renderRecentTable(allData.slice(0,8));
    applyFilter();
}

function updateStats(data){
    const now=new Date(), y=now.getFullYear(), m=now.getMonth();
    const monthly=data.filter(r=>{ const d=new Date(r.created_at); return d.getFullYear()===y && d.getMonth()===m; });
    const totalRev=data.reduce((s,r)=>s+(r.total_price||0),0);
    const monthRev=monthly.reduce((s,r)=>s+(r.total_price||0),0);
    document.getElementById('statTotal').innerHTML=data.length+'<span class="stat-unit"> 건</span>';
    document.getElementById('statRevenue').textContent=fmtWon(totalRev);
    document.getElementById('statMonthly').innerHTML=monthly.length+'<span class="stat-unit"> 건</span>';
    document.getElementById('statMonthlyRev').textContent=fmtWon(monthRev);
}

function buildTableHTML(data, areaId){
    if(!data.length) return '<div class="empty-state"><i class="fa-solid fa-inbox"></i><p>예약 내역이 없습니다.</p></div>';
    const rows=data.map(r=>`
        <tr data-id="${r.id||''}">
            <td><div class="order-id-cell" title="${r.order_id||''}">${r.order_id||'-'}</div></td>
            <td style="font-weight:600;">${r.guest_name||'-'}</td>
            <td>${r.guest_phone ? r.guest_phone.replace(/(\d{3})(\d{3,4})(\d{4})/,'$1-$2-$3') : '-'}</td>
            <td class="room-cell">${r.room_name||'-'}</td>
            <td>${fmtDate(r.checkin_date)}</td>
            <td>${fmtDate(r.checkout_date)}</td>
            <td>${r.nights ? r.nights+'박' : '-'}</td>
            <td class="amount-cell" style="font-weight:700;">${fmtWon(r.total_price)}</td>
            <td>${statusBadge(r.payment_status)}</td>
            <td style="color:rgb(112,112,112);font-size:12px;">${fmtDateTime(r.created_at)}</td>
        </tr>`).join('');
    return `<div style="overflow-x:auto;"><table>
        <thead><tr>
            <th>예약번호</th><th>예약자</th><th>연락처</th><th>객실</th>
            <th>체크인</th><th>체크아웃</th><th>숙박</th>
            <th>금액</th><th>상태</th><th>예약일시</th>
        </tr></thead>
        <tbody>${rows}</tbody>
    </table></div>`;
}

function bindRowClick(areaId, dataset){

}

function renderRecentTable(data){
    const el=document.getElementById('recentTableArea');

    el.innerHTML=buildTableHTML(data,'recentTableArea');

}

function applyFilter(){
    const q=document.getElementById('searchInput')?.value.toLowerCase().trim()||'';
    const room=document.getElementById('filterRoom')?.value||'';
    const status=document.getElementById('filterStatus')?.value||'';
    const from=document.getElementById('filterDateFrom')?.value||'';
    const to=document.getElementById('filterDateTo')?.value||'';
    const filtered=allData.filter(r=>{
        if(q && !['guest_name','guest_email','order_id','guest_phone'].some(k=>r[k]&&r[k].toLowerCase().includes(q))) return false;
        if(room   && r.room_name!==room) return false;
        if(status && r.payment_status!==status) return false;
        if(from   && r.checkin_date<from) return false;
        if(to     && r.checkin_date>to) return false;
        return true;
    });
    const el=document.getElementById('filterCount');
    if(el) el.textContent=`총 ${filtered.length}건`;
    const area=document.getElementById('fullTableArea');
    if(area){ area.innerHTML=buildTableHTML(filtered,'fullTableArea'); bindRowClick('fullTableArea',filtered); }

    document.getElementById('invSheetArea').innerHTML =
        '<div class="inv-loading"><i class="fa-solid fa-circle-notch"></i><p>불러오는 중...</p></div>';

    const startDate = toDateStr(invYear, invMonth, 1);
    const lastDay   = new Date(invYear, invMonth+1, 0).getDate();
    const endDate   = toDateStr(invYear, invMonth, lastDay);

    const {data, error} = await _sb.from('room_inventory').select('*')
        .gte('date', startDate).lte('date', endDate);

    invData = {};
    ROOM_IDS.forEach(id => invData[id] = {});
    if(data) data.forEach(r => {
        if(!invData[r.room_id]) invData[r.room_id] = {};
        invData[r.room_id][r.date] = r;
    });
    if(error) console.error(error);
    renderSheet();
}

function renderSheet(){
    const today    = new Date();
    const todayStr = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());
    const lastDay  = new Date(invYear, invMonth+1, 0).getDate();

    /* 헤더 행 */
    let thead = '<tr><th class="th-room">객실</th>';
    for(let d = 1; d <= lastDay; d++){
        const dow = new Date(invYear, invMonth, d).getDay();
        const dateStr = toDateStr(invYear, invMonth, d);
        const dowCls  = dow===0 ? 'th-sun' : dow===6 ? 'th-sat' : '';
        const todayCls= dateStr===todayStr ? 'th-today' : '';
        thead += `<th class="th-date ${dowCls} ${todayCls}">
            <span class="d-num">${d}</span>
            <span class="d-dow">${DAYS_KO[dow]}</span>
        </th>`;
    }
    thead += '</tr>';

    /* 객실 행 */
    const tbody = ROOM_IDS.map(roomId => {
        const def = ROOM_DEFAULTS[roomId];
        let cells = `<td class="td-room">${def.name}<span>${roomId.toUpperCase()}</span></td>`;

        for(let d = 1; d <= lastDay; d++){
            const dateStr = toDateStr(invYear, invMonth, d);
            const isPast  = dateStr < todayStr;
            const isToday = dateStr === todayStr;
            const rec     = invData[roomId]?.[dateStr];

            const price = rec?.price ?? def.price;
            const stock = rec?.stock ?? def.stock;
            const avail = rec ? rec.is_available : null; // null = 미설정

            let cls = 'inv-cell';
            if(isPast)  cls += ' c-past';
            if(isToday) cls += ' c-today';
            if(rec === undefined)  cls += ' c-none';
            else if(avail)         cls += ' c-avail';
            else                   cls += ' c-closed';

            const dotCls = rec===undefined ? 'ic-dot-none' : avail ? 'ic-dot-avail' : 'ic-dot-closed';
            const priceLabel = rec ? fmtPriceShort(price) : `<span style="color:#bbb;">${fmtPriceShort(price)}</span>`;
            const stockLabel = rec ? `재고${stock}` : `<span style="color:#bbb;">재고${stock}</span>`;

            cells += `<td class="${cls}" onclick="openDateModal('${roomId}','${dateStr}')">
                <span class="ic-price">${priceLabel}</span>
                <span class="ic-stock">${stockLabel}</span>
                <span class="ic-dot ${dotCls}"></span>
            </td>`;
        }
        return `<tr>${cells}</tr>`;
    }).join('');

    document.getElementById('invSheetArea').innerHTML =
        `<table class="inv-table"><thead>${thead}</thead><tbody>${tbody}</tbody></table>`;
}

/* ── 날짜 편집 모달 ── */
function openDateModal(roomId, dateStr){
    const d   = new Date(dateStr+'T00:00:00');
    const def = ROOM_DEFAULTS[roomId];
    const rec = invData[roomId]?.[dateStr];

    editingRoomId  = roomId;
    editingDateStr = dateStr;
    editIsAvail    = rec ? rec.is_available : true;

    document.getElementById('dateModalTitle').textContent =
        `${def.name} · ${d.getMonth()+1}월 ${d.getDate()}일 (${DAYS_KO[d.getDay()]})`;
    document.getElementById('editPrice').value = rec?.price ?? def.price;
    document.getElementById('editStock').value = rec?.stock ?? def.stock;
    setAvail(editIsAvail);

    document.getElementById('dateModal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function setAvail(v){
    editIsAvail = v;
    document.getElementById('btnAvail').className  = v ? 'sel-avail' : '';
    document.getElementById('btnClosed').className = v ? '' : 'sel-closed';
}

async function saveDateEdit(){
    const price = parseInt(document.getElementById('editPrice').value) || 0;
    const stock = parseInt(document.getElementById('editStock').value) || 0;

    const {error} = await _sb.from('room_inventory').upsert(
        { room_id:editingRoomId, date:editingDateStr, is_available:editIsAvail, price, stock },
        { onConflict:'room_id,date' }
    );
    if(error){ alert('저장 실패: '+error.message); return; }

    if(!invData[editingRoomId]) invData[editingRoomId] = {};
    invData[editingRoomId][editingDateStr] = { room_id:editingRoomId, date:editingDateStr, is_available:editIsAvail, price, stock };
    renderSheet();
    closeDateModal();
    showToast('저장되었습니다 ✓');
}

function closeDateModal(){ document.getElementById('dateModal').classList.remove('open'); document.body.style.overflow=''; }

/* ── 일괄 설정 모달 ── */
function openBulkModal(){
    document.getElementById('bulkFrom').value = toDateStr(invYear, invMonth, 1);
    document.getElementById('bulkTo').value   = toDateStr(invYear, invMonth, new Date(invYear, invMonth+1, 0).getDate());
    document.getElementById('bulkAvail').value = 'true';
    document.getElementById('bulkPrice').value = '';
    document.getElementById('bulkStock').value = '';
    document.querySelectorAll('.dow-check').forEach(c => c.checked = true);
    document.getElementById('bulkModal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

async function applyBulkEdit(){
    const from = document.getElementById('bulkFrom').value;
    const to   = document.getElementById('bulkTo').value;
    if(!from || !to || from > to){ alert('날짜 범위를 올바르게 입력해 주세요.'); return; }

    const isAvail = document.getElementById('bulkAvail').value === 'true';
    const priceVal = document.getElementById('bulkPrice').value;
    const stockVal = document.getElementById('bulkStock').value;

    const selectedDows  = Array.from(document.querySelectorAll('input[id^="dow"]:checked')).map(c => parseInt(c.value));
    const selectedRooms = Array.from(document.querySelectorAll('input[id^="br-"]:checked')).map(c => c.value);

    if(!selectedRooms.length){ alert('적용할 객실을 선택해 주세요.'); return; }

    const rows = [];
    selectedRooms.forEach(roomId => {
        let cur = new Date(from+'T00:00:00');
        const end = new Date(to+'T00:00:00');
        while(cur <= end){
            if(selectedDows.includes(cur.getDay())){
                const dateStr  = toDateStr(cur.getFullYear(), cur.getMonth(), cur.getDate());
                const existing = invData[roomId]?.[dateStr];
                const def      = ROOM_DEFAULTS[roomId];
                rows.push({
                    room_id: roomId,
                    date:    dateStr,
                    is_available: isAvail,
                    price: priceVal !== '' ? parseInt(priceVal) : (existing?.price ?? def.price),
                    stock: stockVal !== '' ? parseInt(stockVal) : (existing?.stock ?? def.stock)
                });
            }
            cur.setDate(cur.getDate()+1);
        }
    });

    if(!rows.length){ alert('적용할 날짜가 없습니다.'); return; }

    const btn = document.querySelector('#bulkModal .m-btn-teal');
    btn.textContent = '적용 중...'; btn.disabled = true;

    const {error} = await _sb.from('room_inventory').upsert(rows, {onConflict:'room_id,date'});
    btn.textContent = '일괄 적용'; btn.disabled = false;

    if(error){ alert('일괄 저장 실패: '+error.message); return; }

    rows.forEach(r => {
        if(!invData[r.room_id]) invData[r.room_id] = {};
        invData[r.room_id][r.date] = r;
    });
    renderSheet();
    closeBulkModal();
    showToast(`${rows.length}개 항목 저장 완료 ✓`);
}

function closeBulkModal(){ document.getElementById('bulkModal').classList.remove('open'); document.body.style.overflow=''; }

/* ── 초기 로드 ── */
if(sessionStorage.getItem('adminAuth')==='1'){
    loadReservations();
    initInventory();
}
</script>
