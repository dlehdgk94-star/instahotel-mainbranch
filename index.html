<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Insta</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;900&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; }
        .font-eng { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body class="h-screen flex flex-col text-gray-900 bg-white overflow-hidden">

    <div class="flex justify-between items-end px-12 pt-12 pb-4 border-b border-gray-100">
        <h1 class="font-eng font-black text-[90px] leading-[0.75] tracking-tighter uppercase">Hotel Insta</h1>
        
        <nav class="flex gap-10 text-[16px] font-eng text-gray-500 font-medium mb-1">
            <a href="#" class="text-black border-b-[3px] border-[#318b9d] pb-2">Overview</a>
            <a href="#" class="hover:text-black pb-2 transition">Gallery</a>
            <a href="#" class="hover:text-black pb-2 transition">Accommodations</a>
            <a href="#" class="hover:text-black pb-2 transition">Dining</a>
            <a href="#" class="hover:text-black pb-2 transition">Experiences</a>
            <a href="#" class="hover:text-black pb-2 transition">Events</a>
        </nav>
    </div>

    <div class="flex justify-between items-center px-12 py-5 border-b border-gray-100">
        <div class="flex items-center gap-4">
            <span class="font-eng font-bold text-[22px] tracking-tight uppercase">Hotel Insta, Boutique Collection</span>
            
            <div class="flex text-[#318b9d] gap-1">
                <svg class="w-5 h-5 fill-current" viewBox="0 0 20 20"><circle cx="10" cy="10" r="10"/></svg>
                <svg class="w-5 h-5 fill-current" viewBox="0 0 20 20"><circle cx="10" cy="10" r="10"/></svg>
                <svg class="w-5 h-5 fill-current" viewBox="0 0 20 20"><circle cx="10" cy="10" r="10"/></svg>
                <svg class="w-5 h-5 fill-current" viewBox="0 0 20 20"><circle cx="10" cy="10" r="10"/></svg>
                <svg class="w-5 h-5 text-[#318b9d]" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M10 0 A10 10 0 0 0 10 20 Z" fill="currentColor" stroke="none"/>
                    <circle cx="10" cy="10" r="9"/>
                </svg>
            </div>
            
            <span class="text-[14px] font-bold font-eng">4.6</span>
            <span class="text-[14px] text-gray-800 font-medium underline decoration-gray-400 underline-offset-4 hover:text-black cursor-pointer ml-1">1446 Reviews</span>
        </div>
        
        <div class="flex items-center gap-10 text-[14px] font-eng font-medium text-gray-800">
            <a href="#" class="flex items-center gap-2 hover:underline decoration-gray-400 underline-offset-4">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                VIEW MAP
            </a>
            <a href="#" class="flex items-center gap-2 hover:underline decoration-gray-400 underline-offset-4">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                +82 31-000-0000
            </a>
        </div>
    </div>

    <div class="flex items-center px-12 py-7 bg-white border-b border-gray-100">
        
        <div class="flex-[1.2] flex flex-col cursor-pointer group pr-4">
            <div class="flex items-center gap-2 text-gray-500 text-[12px] font-bold font-eng uppercase tracking-widest mb-3">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Dates (1 Night)
            </div>
            <div class="flex items-center text-[17px] font-eng text-gray-900 font-medium group-hover:text-black">
                Tue, May 26 <span class="mx-6 text-gray-400 font-light">→</span> Wed, May 27
            </div>
        </div>

        <div class="h-16 border-l border-dotted border-gray-400 mx-8"></div>

        <div class="flex-[1.5] flex flex-col cursor-pointer group px-4">
            <div class="text-gray-500 text-[12px] font-bold font-eng uppercase tracking-widest mb-3 pl-1">
                Rooms & Guests
            </div>
            <div class="flex items-center justify-between text-[17px] font-eng text-gray-900 font-medium group-hover:text-black pr-6">
                <span>1 Room, 1 Adult</span>
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
        </div>

        <div class="h-16 border-l border-dotted border-gray-400 mx-8"></div>

        <div class="flex-[1.5] flex flex-col cursor-pointer group px-4">
            <div class="text-gray-500 text-[12px] font-bold font-eng uppercase tracking-widest mb-3 pl-1">
                Special Rates
            </div>
            <div class="flex items-center justify-between text-[17px] font-eng text-gray-900 font-medium group-hover:text-black pr-6">
                <span>Lowest Regular Rate</span>
                <svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>
        </div>

        <div class="pl-10">
            <button class="bg-[#716c6e] text-white px-10 py-3.5 rounded-full font-eng font-bold text-[16px] tracking-wide hover:bg-gray-800 transition">
                View Rates
            </button>
        </div>
    </div>

    <div class="relative flex-1 w-full bg-gray-100 overflow-hidden">
        <img src="https://images.unsplash.com/photo-1542314831-c53cd4b85aca?q=80&w=2000&auto=format&fit=crop" alt="Hotel Interior" class="w-full h-full object-cover">
        
        <div class="absolute bottom-6 left-1/2 -translate-x-1/2 flex items-center gap-3">
            <div class="flex items-center gap-3 bg-black/60 backdrop-blur-md text-white px-4 py-1.5 rounded-full shadow-lg">
                <button class="text-sm hover:text-gray-300 font-eng transition">❮</button>
                <div class="flex gap-1.5 items-center">
                    <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                    <div class="w-1.5 h-1.5 bg-white/40 rounded-full"></div>
                    <div class="w-1.5 h-1.5 bg-white/40 rounded-full"></div>
                </div>
                <button class="text-sm hover:text-gray-300 font-eng transition">❯</button>
            </div>

            <button class="flex items-center gap-2 bg-black/60 backdrop-blur-md text-white px-5 py-1.5 rounded-full text-sm font-eng font-medium shadow-lg hover:bg-black/80 transition">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                Gallery
            </button>
        </div>
    </div>

</body>
</html>
