<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>호텔 랜딩 페이지</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <div class="logo">HOTEL LOGO</div>
        <nav class="menu">
            <a href="#">예약 관리</a>
            <a href="#">회원 가입</a>
            <a href="#">로그인</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>라이즈 오토그래프 컬렉션</h1>
            <p>서울 마포구 양화로 130</p>
        </div>

        <div class="booking-bar">
            <div class="booking-item">
                <label>체크인 - 체크아웃</label>
                <input type="text" placeholder="날짜를 선택하세요">
            </div>
            <div class="booking-item">
                <label>객실 및 인원</label>
                <input type="text" value="1 객실, 1 성인">
            </div>
            <button class="book-btn">요금 확인</button>
        </div>
    </section>

    <nav class="sub-nav">
        <a href="#" class="active">개요</a>
        <a href="#">사진</a>
        <a href="#">객실</a>
        <a href="#">다이닝</a>
        <a href="#">피트니스</a>
    </nav>

    <main class="content">
        </main>
</body>
</html>
